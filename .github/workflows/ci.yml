name: CI - Validate Academy Assets

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate pitch deck (validate create-deck.js)
        run: node create-deck.js

      - name: Verify key outputs
        run: |
          ls -la Starfleet_Padawan_Academy_SpaceX.pptx || echo "PPTX not generated, check script"
          echo "Checking for saga simulators..."
          find . -name "index.html" -not -path "./node_modules/*" | head -10
          echo "CI checks passed for core assets."

      - name: Lint basic HTML presence (example)
        run: |
          for dir in save-me mac-miller-mode final-resources moar-dinosaurs; do
            if [ -f "$dir/index.html" ]; then
              echo "$dir simulator OK"
            fi
          done
